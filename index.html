<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="image">
                <img src="image/image.png" alt="image" height="200px" width="400px">

            </div>

            <div class="article">
                <label for="text">Learning</label>
                <p class="published-date">
                   Published <time datetime="2023-12-21">21 Dec 2023</time>
                </p>

                <h2>HTML $ CSS Foundations</h2>

                <p class="massege">
                    These languages are the backbone of every website,
                    defining structure, content, and presentation.
                </p>

            </div>

            <div class="bottom">
                <img class="img-avatar" src="image/zulkarnaini.jpeg" alt="zulkarnaini" height="20px" width="20px">

                <a class="author-name" href="#">Alidu Zulkarnaini</a>

            </div>

        </div>

    </div>
</body>
</html>
